# 열역학 반응 가능성 예제 카탈로그 (M2)

- key: dH
  label: 반응 엔탈피 변화
  symbol: dH
  unit: "kJ/mol"
  role: input
  description: 반응 전후 엔탈피 변화. 음수면 발열(exothermic), 양수면 흡열(endothermic).
  value: -50
  min: -2000
  max: 2000
  source: 예제값

- key: dS
  label: 반응 엔트로피 변화
  symbol: dS
  unit: "J/mol/K"
  role: input
  description: 반응 전후 엔트로피 변화. 양수면 무질서도가 증가(자발성에 유리).
  value: 80
  min: -2000
  max: 2000
  source: 예제값

- key: temperature
  label: 반응 온도
  symbol: T
  unit: "degC"
  role: input
  description: 반응 온도. dG = dH - T·dS 에서 T 로 쓰이며 내부적으로 K 로 변환된다.
  value: 80
  min: -273.15
  source: 운전조건

- key: R
  label: 기체 상수
  symbol: R
  unit: "J/mol"
  role: constant
  description: 이상기체 상수. K_eq = exp(-dG/RT) 계산에 쓰이는 물리 상수(잠금).
  value: 8.314462618
  source: CODATA

- key: dG
  label: 깁스 자유에너지
  symbol: dG
  unit: "J/mol"
  role: derived
  description: dG = dH - T·dS. 음수면 자발적 반응.

- key: K_eq
  label: 평형상수
  symbol: K_eq
  unit: "-"
  role: derived
  description: 평형상수 K_eq = exp(-dG/RT). 클수록 정반응 쪽으로 치우침.
